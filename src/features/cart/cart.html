<section id="cart" class="cart">
  <h1 class="cart-title">🛒 Shopping Cart</h1>

  <div class="cart-item">
    <input type="checkbox" class="cart-check" checked />

    <img
      class="cart-image"
      src="images/products/213095.750x0.jpeg"
      alt="Radder Burgos"
    />

    <div class="cart-info">
      <h3 class="cart-name">Толстовка чоловіча Radder Burgos</h3>
      <p class="cart-desc">чорна 661921-010</p>
    </div>

    <div class="cart-price">
      <span class="old">$185</span>
      <span class="new">$125</span>
      <span class="discount">-60%</span>
    </div>

    <div class="cart-qty">
      <button>-</button>
      <span>1</span>
      <button>+</button>
    </div>

    <div class="cart-total">$125</div>

    <button class="cart-remove">✕</button>
  </div>
</section>
